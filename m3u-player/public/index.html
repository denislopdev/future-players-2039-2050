<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>M3U Player Online</title>

  <style>
    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      min-height: 100%;
      font-family: "Segoe UI", Arial, sans-serif;
      background: #f7f8fb;
      color: #141824;
    }

    body {
      padding: 18px;
    }

    .m3u-app {
      max-width: 1280px;
      margin: 0 auto;
    }

    .m3u-header {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 16px;
      margin-bottom: 16px;
    }

    .m3u-home {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      width: fit-content;
      margin-bottom: 10px;
      padding: 10px 15px;
      border-radius: 999px;
      background: #ff6a14;
      color: #ffffff;
      text-decoration: none;
      font-size: 14px;
      font-weight: 700;
      box-shadow: 0 10px 24px rgba(255, 106, 20, 0.25);
      transition: transform 0.2s ease, box-shadow 0.2s ease;
    }

    .m3u-home:hover {
      transform: translateY(-1px);
      box-shadow: 0 14px 30px rgba(255, 106, 20, 0.32);
    }

    .m3u-title {
      margin: 0;
      font-size: 24px;
      line-height: 1.2;
      letter-spacing: -0.03em;
    }

    .m3u-subtitle {
      margin: 6px 0 0;
      color: #687084;
      font-size: 14px;
    }

    .m3u-clear {
      border: 0;
      cursor: pointer;
      border-radius: 999px;
      padding: 11px 16px;
      background: #ffffff;
      color: #2c3242;
      box-shadow: 0 10px 30px rgba(20, 24, 36, 0.08);
      font-weight: 600;
    }

    .m3u-clear:hover {
      background: #f3f5fa;
    }

    .m3u-form {
      display: flex;
      gap: 10px;
      background: #ffffff;
      border-radius: 22px;
      padding: 10px;
      box-shadow: 0 18px 45px rgba(20, 24, 36, 0.08);
      margin-bottom: 16px;
    }

    .m3u-input {
      flex: 1;
      width: 100%;
      border: 0;
      outline: 0;
      background: #f3f5fa;
      border-radius: 16px;
      padding: 15px 16px;
      font-size: 16px;
      color: #141824;
    }

    .m3u-input:focus {
      box-shadow: inset 0 0 0 2px rgba(37, 99, 235, 0.18);
    }

    .m3u-button {
      border: 0;
      cursor: pointer;
      border-radius: 16px;
      padding: 0 22px;
      background: #2563eb;
      color: #ffffff;
      font-size: 15px;
      font-weight: 700;
      white-space: nowrap;
    }

    .m3u-button:hover {
      background: #1d4ed8;
    }

    .m3u-layout {
      display: grid;
      grid-template-columns: 310px minmax(0, 1fr);
      gap: 16px;
      align-items: start;
    }

    .m3u-panel,
    .m3u-player-card {
      background: #ffffff;
      border-radius: 24px;
      box-shadow: 0 18px 45px rgba(20, 24, 36, 0.08);
      overflow: hidden;
    }

    .m3u-panel {
      min-height: 520px;
    }

    .m3u-search-wrap {
      padding: 14px;
      border-bottom: 1px solid #eef1f7;
    }

    .m3u-search {
      width: 100%;
      border: 0;
      outline: 0;
      background: #f3f5fa;
      border-radius: 14px;
      padding: 13px 14px;
      font-size: 15px;
    }

    .m3u-search:focus {
      box-shadow: inset 0 0 0 2px rgba(37, 99, 235, 0.16);
    }

    .m3u-folders {
      display: flex;
      flex-direction: column;
      max-height: 230px;
      overflow: auto;
      padding: 10px;
      gap: 8px;
      border-bottom: 1px solid #eef1f7;
    }

    .m3u-folder {
      border: 0;
      cursor: pointer;
      width: 100%;
      text-align: left;
      border-radius: 14px;
      padding: 12px 13px;
      background: #f7f8fb;
      color: #2c3242;
      font-weight: 650;
    }

    .m3u-folder:hover {
      background: #eef2ff;
    }

    .m3u-folder.active {
      background: #2563eb;
      color: #ffffff;
    }

    .m3u-channels {
      max-height: 420px;
      overflow: auto;
      padding: 10px;
    }

    .m3u-channel {
      width: 100%;
      border: 0;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 10px;
      text-align: left;
      border-radius: 16px;
      padding: 10px;
      background: transparent;
      color: #141824;
    }

    .m3u-channel:hover,
    .m3u-channel.active {
      background: #f3f5fa;
    }

    .m3u-logo {
      width: 38px;
      height: 38px;
      min-width: 38px;
      border-radius: 12px;
      background: #e9edf7;
      display: grid;
      place-items: center;
      overflow: hidden;
      font-size: 18px;
    }

    .m3u-logo img {
      width: 100%;
      height: 100%;
      object-fit: contain;
    }

    .m3u-channel-name {
      font-size: 14px;
      font-weight: 650;
      line-height: 1.25;
    }

    .m3u-video-wrap {
      position: relative;
      background: #080b12;
      aspect-ratio: 16 / 9;
      width: 100%;
      display: grid;
      place-items: center;
    }

    video {
      width: 100%;
      height: 100%;
      background: #080b12;
      outline: 0;
    }

    .m3u-loading {
      position: absolute;
      inset: 0;
      display: none;
      align-items: center;
      justify-content: center;
      background: rgba(8, 11, 18, 0.55);
      color: #ffffff;
      font-size: 15px;
      font-weight: 700;
      z-index: 2;
      pointer-events: none;
    }

    .m3u-loading.active {
      display: flex;
    }

    .m3u-now {
      padding: 16px;
      border-top: 1px solid #eef1f7;
    }

    .m3u-now-title {
      margin: 0;
      font-size: 18px;
      font-weight: 800;
    }

    .m3u-now-url {
      display: none;
    }

    .m3u-empty,
    .m3u-status {
      padding: 22px;
      text-align: center;
      color: #687084;
      line-height: 1.5;
    }

    .m3u-status.error {
      color: #dc2626;
    }

    @media (max-width: 860px) {
      body {
        padding: 10px;
      }

      .m3u-title {
        font-size: 21px;
      }

      .m3u-form {
        flex-direction: column;
        border-radius: 20px;
      }

      .m3u-button {
        height: 50px;
      }

      .m3u-layout {
        grid-template-columns: 1fr;
      }

      .m3u-player-card {
        order: 1;
      }

      .m3u-panel {
        order: 2;
        min-height: auto;
      }

      .m3u-folders {
        flex-direction: row;
        max-height: none;
        overflow-x: auto;
        overflow-y: hidden;
        padding-bottom: 12px;
      }

      .m3u-folder {
        min-width: max-content;
        width: auto;
      }

      .m3u-channels {
        max-height: 360px;
      }
    }

    @media (max-width: 520px) {
      .m3u-header {
        flex-direction: column;
      }

      .m3u-clear {
        width: 100%;
      }

      .m3u-home {
        width: 100%;
      }

      .m3u-title {
        font-size: 20px;
      }

      .m3u-subtitle {
        font-size: 13px;
      }

      .m3u-now-title {
        font-size: 16px;
      }
    }
  </style>
</head>

<body>
  <main class="m3u-app">
    <header class="m3u-header">
      <div>
        <a class="m3u-home" href="../">← Back to Gallery</a>

        <h1 class="m3u-title">📺 M3U Player Online</h1>
        <p class="m3u-subtitle">Paste your M3U playlist link and choose a channel.</p>
      </div>

      <button class="m3u-clear" id="clearBtn" type="button">Clear</button>
    </header>

    <form class="m3u-form" id="playlistForm">
      <input
        class="m3u-input"
        id="playlistUrl"
        type="url"
        placeholder="http://m3u.ch/playlist....."
        autocomplete="off"
        required
      />

      <button class="m3u-button" type="submit">Open Playlist</button>
    </form>

    <section class="m3u-layout">
      <aside class="m3u-panel">
        <div class="m3u-search-wrap">
          <input
            class="m3u-search"
            id="searchInput"
            type="search"
            placeholder="Search channel..."
            autocomplete="off"
          />
        </div>

        <div class="m3u-folders" id="folders">
          <div class="m3u-empty">Folders will appear after loading a playlist.</div>
        </div>

        <div class="m3u-channels" id="channels">
          <div class="m3u-empty">No channels loaded yet.</div>
        </div>
      </aside>

      <section class="m3u-player-card">
        <div class="m3u-video-wrap">
          <div class="m3u-loading" id="loadingBox">Loading channel...</div>
          <video id="video" controls playsinline webkit-playsinline></video>
        </div>

        <div class="m3u-now">
          <p class="m3u-now-title" id="nowTitle">No channel selected</p>
          <div class="m3u-now-url" id="nowUrl"></div>
        </div>
      </section>
    </section>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>

  <script>
    const playlistForm = document.getElementById("playlistForm");
    const playlistUrl = document.getElementById("playlistUrl");
    const foldersEl = document.getElementById("folders");
    const channelsEl = document.getElementById("channels");
    const searchInput = document.getElementById("searchInput");
    const video = document.getElementById("video");
    const nowTitle = document.getElementById("nowTitle");
    const nowUrl = document.getElementById("nowUrl");
    const clearBtn = document.getElementById("clearBtn");
    const loadingBox = document.getElementById("loadingBox");

    const BASE_PATH = window.location.pathname
      .replace(/\/index\.html$/, "")
      .replace(/\/player\.html$/, "")
      .replace(/\/$/, "") || "";

    let groups = [];
    let activeGroup = "";
    let activeChannelUrl = "";
    let hls = null;

    function escapeHtml(value) {
      return String(value || "")
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;");
    }

    function showLoading() {
      loadingBox.classList.add("active");
    }

    function hideLoading() {
      loadingBox.classList.remove("active");
    }

    function proxiedUrl(url) {
      return `${BASE_PATH}/api/stream?url=${encodeURIComponent(url)}`;
    }

    function setStatus(message, type = "") {
      channelsEl.innerHTML = `<div class="m3u-status ${type}">${escapeHtml(message)}</div>`;
    }

    function renderFolders() {
      if (!groups.length) {
        foldersEl.innerHTML = `<div class="m3u-empty">Folders will appear after loading a playlist.</div>`;
        return;
      }

      foldersEl.innerHTML = groups
        .map((group) => {
          const isActive = group.name === activeGroup ? "active" : "";

          return `
            <button class="m3u-folder ${isActive}" type="button" data-group="${escapeHtml(group.name)}">
              📁 ${escapeHtml(group.name)}
              <span>(${group.channels.length})</span>
            </button>
          `;
        })
        .join("");

      document.querySelectorAll(".m3u-folder").forEach((button) => {
        button.addEventListener("click", () => {
          activeGroup = button.dataset.group;
          renderFolders();
          renderChannels();
        });
      });
    }

    function renderChannels() {
      const search = searchInput.value.trim().toLowerCase();
      const group = groups.find((item) => item.name === activeGroup);

      if (!group) {
        channelsEl.innerHTML = `<div class="m3u-empty">Select a folder.</div>`;
        return;
      }

      const filtered = group.channels.filter((channel) =>
        channel.name.toLowerCase().includes(search)
      );

      if (!filtered.length) {
        channelsEl.innerHTML = `<div class="m3u-empty">No channels found.</div>`;
        return;
      }

      channelsEl.innerHTML = filtered
        .map((channel) => {
          const isActive = channel.url === activeChannelUrl ? "active" : "";
          const logo = channel.logo
            ? `<img src="${escapeHtml(channel.logo)}" alt="">`
            : `📺`;

          return `
            <button
              class="m3u-channel ${isActive}"
              type="button"
              data-url="${escapeHtml(channel.url)}"
              data-name="${escapeHtml(channel.name)}"
            >
              <span class="m3u-logo">${logo}</span>
              <span class="m3u-channel-name">${escapeHtml(channel.name)}</span>
            </button>
          `;
        })
        .join("");

      document.querySelectorAll(".m3u-channel").forEach((button) => {
        button.addEventListener("click", () => {
          playChannel(button.dataset.url, button.dataset.name);
        });
      });
    }

    function playChannel(url, name) {
      activeChannelUrl = url;
      nowTitle.textContent = name;
      nowUrl.textContent = "";

      showLoading();

      if (hls) {
        hls.destroy();
        hls = null;
      }

      video.pause();
      video.removeAttribute("src");
      video.load();

      const source = proxiedUrl(url);
      const lowerUrl = url.toLowerCase();

      const isHls =
        lowerUrl.includes(".m3u8") ||
        lowerUrl.includes(".m3u") ||
        lowerUrl.includes("m3u8") ||
        lowerUrl.includes("playlist");

      if (isHls && window.Hls && Hls.isSupported()) {
        hls = new Hls({
          enableWorker: true,
          lowLatencyMode: false,
          backBufferLength: 60,
          maxBufferLength: 30,
          maxMaxBufferLength: 60,
          manifestLoadingTimeOut: 20000,
          levelLoadingTimeOut: 20000,
          fragLoadingTimeOut: 30000
        });

        hls.loadSource(source);
        hls.attachMedia(video);

        hls.on(Hls.Events.MANIFEST_PARSED, function () {
          video.play().catch(function () {});
        });

        hls.on(Hls.Events.FRAG_BUFFERED, function () {
          hideLoading();
        });

        hls.on(Hls.Events.ERROR, function (_, data) {
          if (data.fatal) {
            if (data.type === Hls.ErrorTypes.NETWORK_ERROR) {
              hls.startLoad();
            } else if (data.type === Hls.ErrorTypes.MEDIA_ERROR) {
              hls.recoverMediaError();
            } else {
              hideLoading();
              hls.destroy();
              hls = null;
              setStatus("Playback error. Please try another channel.", "error");
            }
          }
        });
      } else {
        video.src = source;

        video.onplaying = function () {
          hideLoading();
        };

        video.onloadeddata = function () {
          hideLoading();
        };

        video.onerror = function () {
          hideLoading();
          setStatus("Playback error. Please try another channel.", "error");
        };

        video.play().catch(function () {
          hideLoading();
        });
      }

      renderChannels();
    }

    async function loadPlaylist(url) {
      setStatus("Loading playlist...");

      const response = await fetch(`${BASE_PATH}/api/playlist?url=${encodeURIComponent(url)}`, {
        cache: "no-store"
      });

      const contentType = response.headers.get("content-type") || "";

      if (!contentType.includes("application/json")) {
        throw new Error("Server returned an invalid response. Please check API path.");
      }

      const data = await response.json();

      if (!response.ok) {
        throw new Error(data.error || "Loading error");
      }

      groups = data.groups || [];
      activeGroup = groups[0]?.name || "";

      renderFolders();
      renderChannels();

      if (!groups.length) {
        setStatus("Playlist loaded, but no channels were found.", "error");
      }
    }

    function clearAll() {
      groups = [];
      activeGroup = "";
      activeChannelUrl = "";

      if (hls) {
        hls.destroy();
        hls = null;
      }

      video.pause();
      video.removeAttribute("src");
      video.load();

      playlistUrl.value = "";
      searchInput.value = "";

      nowTitle.textContent = "No channel selected";
      nowUrl.textContent = "";

      hideLoading();

      renderFolders();
      renderChannels();
    }

    playlistForm.addEventListener("submit", async function (event) {
      event.preventDefault();

      try {
        await loadPlaylist(playlistUrl.value.trim());
      } catch (error) {
        groups = [];
        renderFolders();
        setStatus(error.message || "Could not open the playlist.", "error");
      }
    });

    searchInput.addEventListener("input", renderChannels);
    clearBtn.addEventListener("click", clearAll);

    window.addEventListener("beforeunload", function () {
      clearAll();
    });
  </script>
</body>
</html>
