<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>M3U Player Online | Online Players - Denis Lop</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../assets/players-dark.css" />
  <style>
    .m3u-form { display: flex; }
    .m3u-now-url { display: none; }
  </style>
</head>

<body>
  <div class="page" id="pageRoot">
  <main class="m3u-app">
    <header class="m3u-header">
      <div>
        <a class="m3u-home" href="../">← Online Players Home</a>

        <h1 class="m3u-title">📺 M3U Player Online</h1>
        <p class="m3u-subtitle">Paste your M3U playlist link and choose a channel.</p>
      </div>

      <button class="m3u-clear" id="clearBtn" type="button">Clear</button>
    </header>

    <form class="m3u-form" id="playlistForm">
      <input
        class="m3u-input"
        id="playlistUrl"
        type="url"
        placeholder="http://m3u.ch/playlist....."
        autocomplete="off"
        required
      />

      <button class="m3u-button" type="submit">Open Playlist</button>
    </form>

    <section class="m3u-layout">
      <aside class="m3u-panel">
        <div class="m3u-search-wrap">
          <input
            class="m3u-search"
            id="searchInput"
            type="search"
            placeholder="Search channel..."
            autocomplete="off"
          />
        </div>

        <div class="m3u-folders" id="folders">
          <div class="m3u-empty">Folders will appear after loading a playlist.</div>
        </div>

        <div class="m3u-channels" id="channels">
          <div class="m3u-empty">No channels loaded yet.</div>
        </div>
      </aside>

      <section class="m3u-player-card">
        <div class="m3u-video-wrap">
          <div class="m3u-loading" id="loadingBox">Loading channel...</div>
          <video id="video" controls playsinline webkit-playsinline></video>
        </div>

        <div class="m3u-now">
          <p class="m3u-now-title" id="nowTitle">No channel selected</p>
          <div class="m3u-now-url" id="nowUrl"></div>
        </div>
      </section>
    </section>
  </main>

  <footer class="player-footer">
    <p>Free to use · Created by <a href="https://github.com/denislopdev" target="_blank" rel="noopener">Denis Lop</a></p>
    <p><a href="../">← Back to Online Players Home</a></p>
  </footer>
  </div>

  <script src="../assets/mouse-glow.js"></script>

  <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>

  <script>
    const playlistForm = document.getElementById("playlistForm");
    const playlistUrl = document.getElementById("playlistUrl");
    const foldersEl = document.getElementById("folders");
    const channelsEl = document.getElementById("channels");
    const searchInput = document.getElementById("searchInput");
    const video = document.getElementById("video");
    const nowTitle = document.getElementById("nowTitle");
    const nowUrl = document.getElementById("nowUrl");
    const clearBtn = document.getElementById("clearBtn");
    const loadingBox = document.getElementById("loadingBox");

    const BASE_PATH = window.location.pathname
      .replace(/\/index\.html$/, "")
      .replace(/\/player\.html$/, "")
      .replace(/\/$/, "") || "";

    const IS_GITHUB_PAGES = /\.github\.io$/i.test(window.location.hostname);
    const API_BASE = IS_GITHUB_PAGES
      ? "https://future-players-api.onrender.com/m3u-player"
      : BASE_PATH;

    let groups = [];
    let activeGroup = "";
    let activeChannelUrl = "";
    let hls = null;

    function escapeHtml(value) {
      return String(value || "")
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;");
    }

    function showLoading() {
      loadingBox.classList.add("active");
    }

    function hideLoading() {
      loadingBox.classList.remove("active");
    }

    function absoluteUrl(baseUrl, targetUrl) {
      return new URL(targetUrl, baseUrl).toString();
    }

    function parseAttributes(input) {
      const attrs = {};
      const regex = /([\w-]+)="([^"]*)"/g;
      let match;

      while ((match = regex.exec(input)) !== null) {
        attrs[match[1]] = match[2];
      }

      return attrs;
    }

    function parseM3UClient(text, playlistUrl) {
      const lines = text
        .replace(/\r/g, "")
        .split("\n")
        .map(function (line) {
          return line.trim();
        })
        .filter(Boolean);

      const groupMap = {};
      let current = null;

      for (let i = 0; i < lines.length; i++) {
        const line = lines[i];

        if (line.indexOf("#EXTINF") === 0) {
          const commaIndex = line.indexOf(",");
          const meta = commaIndex >= 0 ? line.slice(0, commaIndex) : line;
          const name = commaIndex >= 0 ? line.slice(commaIndex + 1).trim() : "Untitled Channel";
          const attrs = parseAttributes(meta);

          current = {
            name: name || attrs["tvg-name"] || "Untitled Channel",
            logo: attrs["tvg-logo"] || "",
            group: attrs["group-title"] || "Other",
            url: ""
          };
        } else if (line.indexOf("#EXTGRP:") === 0 && current) {
          current.group = line.replace("#EXTGRP:", "").trim() || "Other";
        } else if (line.indexOf("#") !== 0 && current) {
          current.url = absoluteUrl(playlistUrl, line);

          if (!groupMap[current.group]) {
            groupMap[current.group] = [];
          }

          groupMap[current.group].push(current);
          current = null;
        }
      }

      return Object.keys(groupMap)
        .sort(function (a, b) {
          return a.localeCompare(b, "en");
        })
        .map(function (name) {
          return {
            name: name,
            channels: groupMap[name].sort(function (a, b) {
              return a.name.localeCompare(b.name, "en");
            })
          };
        });
    }

    async function fetchPlaylistText(url) {
      const proxyUrl = `https://api.allorigins.win/raw?url=${encodeURIComponent(url)}`;
      const response = await fetch(proxyUrl, { cache: "no-store" });

      if (!response.ok) {
        throw new Error("Could not load the playlist.");
      }

      return response.text();
    }

    function proxiedUrl(url) {
      return `${API_BASE}/api/stream?url=${encodeURIComponent(url)}`;
    }

    function setStatus(message, type = "") {
      channelsEl.innerHTML = `<div class="m3u-status ${type}">${escapeHtml(message)}</div>`;
    }

    function renderFolders() {
      if (!groups.length) {
        foldersEl.innerHTML = `<div class="m3u-empty">Folders will appear after loading a playlist.</div>`;
        return;
      }

      foldersEl.innerHTML = groups
        .map((group) => {
          const isActive = group.name === activeGroup ? "active" : "";

          return `
            <button class="m3u-folder ${isActive}" type="button" data-group="${escapeHtml(group.name)}">
              📁 ${escapeHtml(group.name)}
              <span>(${group.channels.length})</span>
            </button>
          `;
        })
        .join("");

      document.querySelectorAll(".m3u-folder").forEach((button) => {
        button.addEventListener("click", () => {
          activeGroup = button.dataset.group;
          renderFolders();
          renderChannels();
        });
      });
    }

    function renderChannels() {
      const search = searchInput.value.trim().toLowerCase();
      const group = groups.find((item) => item.name === activeGroup);

      if (!group) {
        channelsEl.innerHTML = `<div class="m3u-empty">Select a folder.</div>`;
        return;
      }

      const filtered = group.channels.filter((channel) =>
        channel.name.toLowerCase().includes(search)
      );

      if (!filtered.length) {
        channelsEl.innerHTML = `<div class="m3u-empty">No channels found.</div>`;
        return;
      }

      channelsEl.innerHTML = filtered
        .map((channel) => {
          const isActive = channel.url === activeChannelUrl ? "active" : "";
          const logo = channel.logo
            ? `<img src="${escapeHtml(channel.logo)}" alt="">`
            : `📺`;

          return `
            <button
              class="m3u-channel ${isActive}"
              type="button"
              data-url="${escapeHtml(channel.url)}"
              data-name="${escapeHtml(channel.name)}"
            >
              <span class="m3u-logo">${logo}</span>
              <span class="m3u-channel-name">${escapeHtml(channel.name)}</span>
            </button>
          `;
        })
        .join("");

      document.querySelectorAll(".m3u-channel").forEach((button) => {
        button.addEventListener("click", () => {
          playChannel(button.dataset.url, button.dataset.name);
        });
      });
    }

    function playChannel(url, name) {
      activeChannelUrl = url;
      nowTitle.textContent = name;
      nowUrl.textContent = "";

      showLoading();

      if (hls) {
        hls.destroy();
        hls = null;
      }

      video.pause();
      video.removeAttribute("src");
      video.load();

      const source = proxiedUrl(url);
      const lowerUrl = url.toLowerCase();

      const isHls =
        lowerUrl.includes(".m3u8") ||
        lowerUrl.includes(".m3u") ||
        lowerUrl.includes("m3u8") ||
        lowerUrl.includes("playlist");

      if (isHls && window.Hls && Hls.isSupported()) {
        hls = new Hls({
          enableWorker: true,
          lowLatencyMode: false,
          backBufferLength: 60,
          maxBufferLength: 30,
          maxMaxBufferLength: 60,
          manifestLoadingTimeOut: 45000,
          levelLoadingTimeOut: 45000,
          fragLoadingTimeOut: 60000
        });

        hls.loadSource(source);
        hls.attachMedia(video);

        hls.on(Hls.Events.MANIFEST_PARSED, function () {
          video.play().catch(function () {});
        });

        hls.on(Hls.Events.FRAG_BUFFERED, function () {
          hideLoading();
        });

        hls.on(Hls.Events.ERROR, function (_, data) {
          if (data.fatal) {
            if (data.type === Hls.ErrorTypes.NETWORK_ERROR) {
              hls.startLoad();
            } else if (data.type === Hls.ErrorTypes.MEDIA_ERROR) {
              hls.recoverMediaError();
            } else {
              hideLoading();
              hls.destroy();
              hls = null;
              setStatus("Playback error. Please try another channel.", "error");
            }
          }
        });
      } else {
        video.src = source;

        video.onplaying = function () {
          hideLoading();
        };

        video.onloadeddata = function () {
          hideLoading();
        };

        video.onerror = function () {
          hideLoading();
          setStatus("Playback error. Please try another channel.", "error");
        };

        video.play().catch(function () {
          hideLoading();
        });
      }

      renderChannels();
    }

    async function loadPlaylist(url) {
      setStatus("Loading playlist...");

      try {
        const response = await fetch(`${API_BASE}/api/playlist?url=${encodeURIComponent(url)}`, {
          cache: "no-store"
        });

        const contentType = response.headers.get("content-type") || "";

        if (contentType.includes("application/json")) {
          const data = await response.json();

          if (!response.ok) {
            throw new Error(data.error || "Loading error");
          }

          groups = data.groups || [];
          activeGroup = groups[0]?.name || "";

          renderFolders();
          renderChannels();

          if (!groups.length) {
            setStatus("Playlist loaded, but no channels were found.", "error");
          }

          return;
        }
      } catch (error) {
        if (!IS_GITHUB_PAGES) {
          throw error;
        }
      }

      if (!IS_GITHUB_PAGES) {
        throw new Error("Server returned an invalid response. Please check API path.");
      }

      const text = await fetchPlaylistText(url);

      if (text.indexOf("#EXTM3U") === -1) {
        throw new Error("This does not look like a valid M3U playlist");
      }

      groups = parseM3UClient(text, url);
      activeGroup = groups[0]?.name || "";

      renderFolders();
      renderChannels();

      if (!groups.length) {
        setStatus("Playlist loaded, but no channels were found.", "error");
      }
    }

    function clearAll() {
      groups = [];
      activeGroup = "";
      activeChannelUrl = "";

      if (hls) {
        hls.destroy();
        hls = null;
      }

      video.pause();
      video.removeAttribute("src");
      video.load();

      playlistUrl.value = "";
      searchInput.value = "";

      nowTitle.textContent = "No channel selected";
      nowUrl.textContent = "";

      hideLoading();

      renderFolders();
      renderChannels();
    }

    playlistForm.addEventListener("submit", async function (event) {
      event.preventDefault();

      try {
        await loadPlaylist(playlistUrl.value.trim());
      } catch (error) {
        groups = [];
        renderFolders();
        setStatus(error.message || "Could not open the playlist.", "error");
      }
    });

    searchInput.addEventListener("input", renderChannels);
    clearBtn.addEventListener("click", clearAll);

    window.addEventListener("beforeunload", function () {
      clearAll();
    });
  </script>
</body>
</html>
