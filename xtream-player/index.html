<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Extreme Code Player Online | Online Players - Denis Lop</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../assets/players-dark.css" />
</head>

<body>
  <div class="page" id="pageRoot">
  <main class="xapp">
    <header class="xheader">
      <div>
        <a class="xhome" href="../">&#8592; Online Players Home</a>
        <h1 class="xtitle">?? Extreme Code Player Online</h1>
        <p class="xsubtitle">Enter DNS, username, and password to load your live TV channels.</p>
      </div>

      <button class="xclear" id="clearBtn" type="button">Clear</button>
    </header>

    <form class="xform" id="loginForm">
      <input class="xinput" id="dnsInput" type="url" placeholder="DNS / Server URL, example: http://example.com" autocomplete="off" required />
      <input class="xinput" id="usernameInput" type="text" placeholder="Username" autocomplete="off" required />
      <input class="xinput" id="passwordInput" type="password" placeholder="Password" autocomplete="off" required />
      <button class="xbutton" type="submit">Open Playlist</button>
    </form>

    <section class="xlayout">
      <aside class="xpanel">
        <div class="xsearch-wrap">
          <input class="xsearch" id="searchInput" type="search" placeholder="Search channel..." autocomplete="off" />
        </div>

        <div class="xcategories" id="categories">
          <div class="xempty">Categories will appear after login.</div>
        </div>

        <div class="xchannels" id="channels">
          <div class="xempty">No channels loaded yet.</div>
        </div>
      </aside>

      <section class="xplayer-card">
        <div class="xvideo-wrap">
          <div class="xloading" id="loadingBox">Loading channel...</div>
          <video id="video" controls playsinline webkit-playsinline></video>
        </div>

        <div class="xnow">
          <p class="xnow-title" id="nowTitle">No channel selected</p>
        </div>
      </section>
    </section>
  </main>

  <footer class="player-footer">
    <p>Free to use ? Created by <a href="https://github.com/denislopdev" target="_blank" rel="noopener">Denis Lop</a></p>
    <p><a href="../">&#8592; Back to Online Players Home</a></p>
  </footer>
  </div>

  <script src="../assets/mouse-glow.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>

  <script>
    const loginForm = document.getElementById("loginForm");
    const dnsInput = document.getElementById("dnsInput");
    const usernameInput = document.getElementById("usernameInput");
    const passwordInput = document.getElementById("passwordInput");
    const categoriesEl = document.getElementById("categories");
    const channelsEl = document.getElementById("channels");
    const searchInput = document.getElementById("searchInput");
    const video = document.getElementById("video");
    const nowTitle = document.getElementById("nowTitle");
    const clearBtn = document.getElementById("clearBtn");
    const loadingBox = document.getElementById("loadingBox");

    const BASE_PATH = window.location.pathname
      .replace(/\/index\.html$/, "")
      .replace(/\/xtream-player\.html$/, "")
      .replace(/\/$/, "") || "";

    const IS_GITHUB_PAGES = /\.github\.io$/i.test(window.location.hostname);
    const API_BASE = IS_GITHUB_PAGES
      ? "https://future-players-api.onrender.com/xtream-player"
      : BASE_PATH;

    let categories = [];
    let channels = [];
    let activeCategory = "all";
    let activeChannelId = "";
    let hls = null;
    let session = {
      dns: "",
      username: "",
      password: ""
    };

    function escapeHtml(value) {
      return String(value || "")
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;");
    }

    function showLoading() {
      loadingBox.classList.add("active");
    }

    function hideLoading() {
      loadingBox.classList.remove("active");
    }

    function normalizeDns(value) {
      return String(value || "").trim().replace(/\/+$/, "");
    }

    function setStatus(message, type = "") {
      channelsEl.innerHTML = `<div class="xstatus ${type}">${escapeHtml(message)}</div>`;
    }

    function renderCategories() {
      if (!categories.length) {
        categoriesEl.innerHTML = `<div class="xempty">Categories will appear after login.</div>`;
        return;
      }

      const allCount = channels.length;
      const items = [
        { category_id: "all", category_name: "All Channels", count: allCount },
        ...categories.map((cat) => ({
          ...cat,
          count: channels.filter((ch) => String(ch.category_id || "") === String(cat.category_id || "")).length
        }))
      ];

      categoriesEl.innerHTML = items.map((cat) => {
        const id = String(cat.category_id || "all");
        const isActive = id === String(activeCategory) ? "active" : "";

        return `
          <button class="xcategory ${isActive}" type="button" data-category="${escapeHtml(id)}">
            ?? ${escapeHtml(cat.category_name || "Other")}
            <span>(${cat.count || 0})</span>
          </button>
        `;
      }).join("");

      document.querySelectorAll(".xcategory").forEach((button) => {
        button.addEventListener("click", () => {
          activeCategory = button.dataset.category;
          renderCategories();
          renderChannels();
        });
      });
    }

    function renderChannels() {
      const search = searchInput.value.trim().toLowerCase();

      let filtered = channels.filter((channel) => {
        const sameCategory = activeCategory === "all" || String(channel.category_id || "") === String(activeCategory);
        const sameSearch = String(channel.name || "").toLowerCase().includes(search);
        return sameCategory && sameSearch;
      });

      if (!filtered.length) {
        channelsEl.innerHTML = `<div class="xempty">No channels found.</div>`;
        return;
      }

      channelsEl.innerHTML = filtered.map((channel) => {
        const streamId = String(channel.stream_id || "");
        const isActive = streamId === activeChannelId ? "active" : "";
        const logo = channel.stream_icon
          ? `<img src="${escapeHtml(channel.stream_icon)}" alt="">`
          : `??`;

        return `
          <button
            class="xchannel ${isActive}"
            type="button"
            data-id="${escapeHtml(streamId)}"
            data-name="${escapeHtml(channel.name || "Channel")}"
            data-ext="${escapeHtml(channel.container_extension || "m3u8")}"
          >
            <span class="xlogo">${logo}</span>
            <span class="xchannel-name">${escapeHtml(channel.name || "Channel")}</span>
          </button>
        `;
      }).join("");

      document.querySelectorAll(".xchannel").forEach((button) => {
        button.addEventListener("click", () => {
          playChannel(button.dataset.id, button.dataset.name, button.dataset.ext);
        });
      });
    }

    function getStreamUrl(streamId, ext) {
      const params = new URLSearchParams({
        dns: session.dns,
        username: session.username,
        password: session.password,
        stream_id: streamId,
        ext: ext || "m3u8"
      });

      return `${API_BASE}/api/xtream/stream?${params.toString()}`;
    }

    function playChannel(streamId, name, ext) {
      if (!streamId) return;

      activeChannelId = String(streamId);
      nowTitle.textContent = name || "Selected channel";
      showLoading();

      if (hls) {
        hls.destroy();
        hls = null;
      }

      video.pause();
      video.removeAttribute("src");
      video.load();

      const source = getStreamUrl(streamId, ext);
      const lowerExt = String(ext || "").toLowerCase();

      const isHls = lowerExt.includes("m3u8") || lowerExt.includes("m3u");

      if (isHls && window.Hls && Hls.isSupported()) {
        hls = new Hls({
          enableWorker: false,
          lowLatencyMode: false,
          backBufferLength: 60,
          maxBufferLength: 30,
          maxMaxBufferLength: 60,
          manifestLoadingTimeOut: 45000,
          levelLoadingTimeOut: 45000,
          fragLoadingTimeOut: 60000,
          xhrSetup: function (xhr) {
            xhr.withCredentials = false;
          }
        });

        hls.loadSource(source);
        hls.attachMedia(video);

        hls.on(Hls.Events.MANIFEST_PARSED, function () {
          video.play().catch(function () {});
        });

        hls.on(Hls.Events.FRAG_BUFFERED, function () {
          hideLoading();
        });

        hls.on(Hls.Events.ERROR, function (_, data) {
          if (data.fatal) {
            if (data.type === Hls.ErrorTypes.NETWORK_ERROR) {
              hls.startLoad();
            } else if (data.type === Hls.ErrorTypes.MEDIA_ERROR) {
              hls.recoverMediaError();
            } else {
              hideLoading();
              hls.destroy();
              hls = null;
              setStatus("Playback error. Please try another channel.", "error");
            }
          }
        });
      } else {
        video.src = source;

        video.onplaying = function () { hideLoading(); };
        video.onloadeddata = function () { hideLoading(); };

        video.onerror = function () {
          hideLoading();
          setStatus("Playback error. Please try another channel.", "error");
        };

        video.play().catch(function () {
          hideLoading();
        });
      }

      renderChannels();
    }

    async function loadXtream() {
      session = {
        dns: normalizeDns(dnsInput.value),
        username: usernameInput.value.trim(),
        password: passwordInput.value.trim()
      };

      if (!session.dns || !session.username || !session.password) {
        throw new Error("Please enter DNS, username, and password.");
      }

      setStatus("Loading Xtream playlist...");

      const params = new URLSearchParams(session);

      const response = await fetch(`${API_BASE}/api/xtream/live?${params.toString()}`, {
        cache: "no-store"
      });

      const contentType = response.headers.get("content-type") || "";
      if (!contentType.includes("application/json")) {
        if (IS_GITHUB_PAGES) {
          throw new Error("API server is not ready yet. Wait a minute and try again, or deploy the API from render.yaml in the repository.");
        }

        throw new Error("Server returned an invalid response. Please check API path.");
      }

      const data = await response.json();

      if (!response.ok) {
        throw new Error(data.error || "Loading error");
      }

      categories = data.categories || [];
      channels = data.channels || [];
      activeCategory = "all";

      renderCategories();
      renderChannels();

      if (!channels.length) {
        setStatus("Connected, but no live channels were found.", "error");
      }
    }

    function clearAll() {
      categories = [];
      channels = [];
      activeCategory = "all";
      activeChannelId = "";
      session = { dns: "", username: "", password: "" };

      if (hls) {
        hls.destroy();
        hls = null;
      }

      video.pause();
      video.removeAttribute("src");
      video.load();

      dnsInput.value = "";
      usernameInput.value = "";
      passwordInput.value = "";
      searchInput.value = "";

      nowTitle.textContent = "No channel selected";

      hideLoading();

      renderCategories();
      renderChannels();
    }

    loginForm.addEventListener("submit", async function (event) {
      event.preventDefault();

      try {
        await loadXtream();
      } catch (error) {
        categories = [];
        channels = [];
        renderCategories();
        setStatus(error.message || "Could not open Xtream playlist.", "error");
      }
    });

    searchInput.addEventListener("input", renderChannels);
    clearBtn.addEventListener("click", clearAll);

    window.addEventListener("beforeunload", function () {
      clearAll();
    });
  </script>
</body>
</html>
